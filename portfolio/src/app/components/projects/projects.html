<section id="projects" class="py-24 bg-white dark:bg-[#07070a]">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    
    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-display font-black uppercase tracking-widest text-gray-900 dark:text-white drop-shadow-sm dark:drop-shadow-[0_0_10px_rgba(255,255,255,0.2)]">
        {{ langService.translate('PROJECTS_TITLE')() }}
      </h2>
      <div class="mt-4 w-24 h-1 bg-neon-cyan shadow-neon-cyan mx-auto"></div>
    </div>

    <!-- Projects Slider Container -->
    <div class="relative group/slider" 
         (mouseenter)="stopAutoPlay()" 
         (mouseleave)="startAutoPlay()">
      
      <!-- Viewport -->
      <div class="overflow-hidden py-10">
        <div class="flex transition-transform duration-700 ease-in-out"
             [style.transform]="'translateX(-' + (currentIndex() * (100 / (projects.length >= 3 ? 3 : 1))) + '%)'">
          
          <!-- Slide Item -->
          <article *ngFor="let proj of projects; let i = index" 
                class="min-w-full md:min-w-[50%] lg:min-w-[33.333%] px-4"
                [attr.aria-label]="'Project: ' + langService.translate(proj.nameKey)()">
            
            <a [href]="proj.link" target="_blank" rel="noopener noreferrer"
               [attr.aria-label]="'View ' + langService.translate(proj.nameKey)() + ' on GitHub'"
               class="block h-full bg-gray-50 dark:bg-dark-card border border-gray-200 dark:border-dark-border overflow-hidden transition-all duration-300 hover:-translate-y-2 hover:shadow-[0_0_30px_rgba(255,255,255,0.1)] relative group"
               [ngClass]="{
                 'hover:shadow-neon-cyan dark:hover:border-neon-cyan': proj.color === 'neon-cyan',
                 'hover:shadow-neon-magenta dark:hover:border-neon-magenta': proj.color === 'neon-magenta',
                 'hover:shadow-neon-purple dark:hover:border-neon-purple': proj.color === 'neon-purple',
                 'hover:shadow-neon-blue dark:hover:border-neon-blue': proj.color === 'neon-blue'
               }">
              
              <!-- Card Content: Original Vertical Format -->
              <div class="h-48 bg-gray-200 dark:bg-gray-800 relative overflow-hidden">
                <div class="absolute inset-0 z-10 opacity-30 pointer-events-none"
                     style="background-image: linear-gradient(var(--tw-dark-border) 1px, transparent 1px); background-size: 100% 20px;"></div>
                <img [src]="proj.image" [alt]="'Screenshot of ' + langService.translate(proj.nameKey)()" 
                     class="w-full h-full object-contain p-6 transform group-hover:scale-110 transition-transform duration-700" />
              </div>
              
              <div class="p-6">
                <h3 class="text-xl font-display font-bold mb-3 transition-colors"
                    [ngClass]="{
                      'text-neon-cyan': proj.color === 'neon-cyan',
                      'text-neon-magenta': proj.color === 'neon-magenta',
                      'text-neon-purple': proj.color === 'neon-purple',
                      'text-neon-blue': proj.color === 'neon-blue'
                    }">
                  {{ langService.translate(proj.nameKey)() }}
                </h3>
                <p class="text-gray-600 dark:text-gray-400 text-sm mb-6 line-clamp-2">
                  {{ langService.translate(proj.descKey)() }}
                </p>
                
                <div class="flex gap-2 text-[10px] font-mono flex-wrap mt-auto">
                  <span *ngFor="let tag of proj.tags" 
                        class="px-2 py-0.5 bg-gray-200 dark:bg-gray-800 border border-transparent transition-colors uppercase"
                        [ngClass]="{
                          'dark:text-neon-cyan dark:border-neon-cyan': proj.color === 'neon-cyan',
                          'dark:text-neon-magenta dark:border-neon-magenta': proj.color === 'neon-magenta',
                          'dark:text-neon-purple dark:border-neon-purple': proj.color === 'neon-purple',
                          'dark:text-neon-blue dark:border-neon-blue': proj.color === 'neon-blue'
                        }">
                    {{ tag }}
                  </span>
                </div>
              </div>

              <!-- Glow Corner -->
              <div class="absolute -bottom-4 -right-4 w-16 h-16 blur-2xl opacity-0 transition-opacity group-hover:opacity-40"
                   [ngClass]="{
                     'bg-neon-cyan': proj.color === 'neon-cyan',
                     'bg-neon-magenta': proj.color === 'neon-magenta',
                     'bg-neon-purple': proj.color === 'neon-purple',
                     'bg-neon-blue': proj.color === 'neon-blue'
                   }"></div>
            </a>
          </article>
        </div>
      </div>

      <!-- Navigation Arrows -->
      <button (click)="prev()" aria-label="Previous project"
              class="absolute -left-6 top-1/2 -translate-y-1/2 z-20 p-2 text-gray-400 hover:text-white transition-all hidden lg:block">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 drop-shadow-[0_0_8px_rgba(255,255,255,0.4)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 19l-7-7 7-7" />
        </svg>
      </button>

      <button (click)="next()" aria-label="Next project"
              class="absolute -right-6 top-1/2 -translate-y-1/2 z-20 p-2 text-gray-400 hover:text-white transition-all hidden lg:block">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 drop-shadow-[0_0_8px_rgba(255,255,255,0.4)]" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5l7 7-7 7" />
        </svg>
      </button>

      <!-- Dots Indicator -->
      <div class="flex justify-center gap-2 mt-4" role="tablist">
        <button *ngFor="let p of projects; let i = index" 
                (click)="goToSlide(i)"
                [attr.aria-label]="'Go to slide ' + (i + 1)"
                role="tab"
                [attr.aria-selected]="i === currentIndex()"
                class="w-2 h-2 rounded-full transition-all duration-300"
                [ngClass]="{
                  'bg-neon-cyan scale-125 shadow-neon-cyan': i === currentIndex(),
                  'bg-gray-300 dark:bg-gray-700': i !== currentIndex()
                }">
        </button>
      </div>

    </div>
  </div>
</section>
