<section class="relative min-h-[calc(100vh-4rem)] flex items-center justify-center overflow-hidden bg-white dark:bg-[#050505]">
  
  <!-- Animated Background Grid (Cyberpunk Style) -->
  <div class="absolute inset-0 z-0 opacity-20 dark:opacity-30 pointer-events-none"
       style="background-image: linear-gradient(var(--tw-dark-border) 1px, transparent 1px), linear-gradient(90deg, var(--tw-dark-border) 1px, transparent 1px); background-size: 50px 50px;">
  </div>

  <!-- Abstract Orbit Lines -->
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] border border-gray-200 dark:border-gray-800 rounded-full opacity-50 z-0"></div>
  <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[1200px] h-[1200px] border border-gray-200 dark:border-gray-800 rounded-full opacity-30 z-0"></div>

  <!-- Central Content -->
  <div class="relative z-20 text-center max-w-3xl px-4 pointer-events-none">
    <div class="text-xl md:text-3xl font-mono text-neon-cyan mb-2 font-bold tracking-widest drop-shadow-[0_0_8px_rgba(0,243,255,0.8)] pointer-events-auto" role="doc-subtitle">IGNASI FERRÉS IGLESIAS</div>
    <h1 class="text-5xl md:text-7xl font-display font-black mb-6 tracking-tighter uppercase 
             text-gray-900 dark:text-white drop-shadow-sm dark:drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">
      {{ langService.translate('HERO_TITLE')() }}
    </h1>
    <p class="text-lg md:text-xl text-gray-600 dark:text-gray-400 font-light mb-10 max-w-2xl mx-auto">
      {{ langService.translate('HERO_SUBTITLE')() }}
    </p>

    <div class="flex justify-center gap-6 pointer-events-auto">
      <a href="#projects" class="group relative px-8 py-3 font-bold text-white bg-neon-purple hover:bg-neon-magenta shadow-[0_0_15px_rgba(188,19,254,0.6)] hover:shadow-[0_0_25px_rgba(255,0,255,0.8)] transition-all uppercase tracking-wider rounded-sm overflow-hidden border border-neon-magenta"
         aria-label="View my projects">
        <span class="relative z-10">{{ langService.translate('NAV_PROJECTS')() }}</span>
        <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-20 transition-opacity"></div>
      </a>
    </div>
  </div>

  <!-- Floating Images / Orbiting Nodes -->
  
  <!-- INNER ORBIT (w-[800px] radius=400px) -->
  <div class="hidden lg:block absolute top-1/2 left-1/2 w-0 h-0 z-10 animate-spin-medium" aria-hidden="true">
    
    <!-- AR Shop (0 degrees) -->
    <div class="absolute left-[400px] top-0 -translate-x-1/2 -translate-y-1/2">
      <a href="https://github.com/IGprojects/AR-Shop" target="_blank" rel="noopener noreferrer" aria-label="AR Shop on GitHub" class="flex items-center justify-center w-36 h-36 rounded-full transition-all duration-1000 ease-in-out shadow-[0_0_15px_rgba(0,243,255,0.3)] hover:shadow-[0_0_30px_rgba(0,243,255,0.6)] border border-gray-800 bg-dark-card hover:scale-105 animate-spin-reverse-medium group">
        <img src="assets/img/LOGOS-LANDING/logo_ARSHOP-removebg-preview.png" alt="Logo for AR Shop project" class="w-full h-full p-1 object-contain scale-[1.6] opacity-90 group-hover:opacity-100 drop-shadow-[0_0_8px_rgba(255,255,255,0.1)] transition-transform duration-1000 ease-in-out" />
        <div class="absolute -bottom-1 right-2 w-3 h-3 bg-neon-cyan rounded-full shadow-neon-cyan animate-glow-slow"></div>
      </a>
    </div>

    <!-- Spotify Backup (180 degrees) -->
    <div class="absolute left-[-400px] top-0 -translate-x-1/2 -translate-y-1/2">
      <a href="https://github.com/IGprojects/Spotify-Backup-App" target="_blank" rel="noopener noreferrer" aria-label="Spotify Backup on GitHub" class="flex items-center justify-center w-36 h-36 rounded-full transition-all duration-1000 ease-in-out shadow-[0_0_15px_rgba(188,19,254,0.3)] hover:shadow-[0_0_30px_rgba(188,19,254,0.6)] border border-gray-800 bg-dark-card hover:scale-105 animate-spin-reverse-medium group">
        <img src="assets/img/LOGOS-LANDING/logo_SPOTIFYBACKUP-removebg-preview.png" alt="Logo for Spotify Backup project" class="w-full h-full p-1 object-contain scale-[1.6] opacity-90 group-hover:opacity-100 drop-shadow-[0_0_8px_rgba(255,255,255,0.1)] transition-transform duration-1000 ease-in-out" />
        <div class="absolute top-2 right-1 w-3 h-3 bg-neon-purple rounded-full shadow-neon-purple animate-glow-slow"></div>
      </a>
    </div>

    <!-- Fidelity Records (270 degrees) -->
    <div class="absolute left-0 top-[-400px] -translate-x-1/2 -translate-y-1/2">
      <a href="https://fidelity-records-frontend.vercel.app/inicio" target="_blank" rel="noopener noreferrer" aria-label="Fidelity Records Live" class="flex items-center justify-center w-36 h-36 rounded-full transition-all duration-1000 ease-in-out shadow-[0_0_15px_rgba(188,19,254,0.3)] hover:shadow-[0_0_30px_rgba(188,19,254,0.6)] border border-gray-800 bg-dark-card hover:scale-105 animate-spin-reverse-medium group">
        <img src="assets/img/logo_fidelityrecordNobackground.png" alt="Logo for Fidelity Records project" class="w-full h-full p-1 object-contain scale-[0.8] opacity-90 group-hover:opacity-100 drop-shadow-[0_0_8px_rgba(255,255,255,0.1)] transition-transform duration-1000 ease-in-out" />
        <div class="absolute top-1 left-1 w-3 h-3 bg-neon-purple rounded-full shadow-neon-purple animate-glow-slow"></div>
      </a>
    </div>

  </div>

  <!-- OUTER ORBIT (w-[1200px] radius=600px) -->
  <div class="hidden lg:block absolute top-1/2 left-1/2 w-0 h-0 z-10 animate-spin-slow" aria-hidden="true">
    
    <!-- TabRush (90 degrees -> left-[0px] top-[600px]) -->
    <div class="absolute left-0 top-[600px] -translate-x-1/2 -translate-y-1/2">
      <a href="https://igprojects.github.io/TabRush/" target="_blank" rel="noopener noreferrer" aria-label="TabRush on GitHub" class="flex items-center justify-center w-36 h-36 rounded-full transition-all duration-1000 ease-in-out shadow-[0_0_15px_rgba(255,0,255,0.3)] hover:shadow-[0_0_30px_rgba(255,0,255,0.6)] border border-gray-800 bg-dark-card hover:scale-105 animate-spin-reverse-slow group">
        <img src="assets/img/LOGO_TABRUSH-removebg-preview (1).png" alt="Logo for TabRush project" class="w-full h-full p-2 object-contain scale-100 opacity-90 group-hover:opacity-100 drop-shadow-[0_0_8px_rgba(255,255,255,0.1)] transition-transform duration-1000 ease-in-out" />
        <div class="absolute top-1 left-2 w-3 h-3 bg-neon-magenta rounded-full shadow-neon-magenta animate-glow-slow"></div>
      </a>
    </div>

    <!-- Transpotravel (270 degrees -> left-[0px] top-[-600px]) -->
    <div class="absolute left-0 top-[-600px] -translate-x-1/2 -translate-y-1/2">
      <a href="https://github.com/IGprojects/Agencia_de_Viajes-Transpotravel" target="_blank" rel="noopener noreferrer" aria-label="Transpotravel on GitHub" class="flex items-center justify-center w-40 h-40 rounded-full transition-all duration-1000 ease-in-out shadow-[0_0_15px_rgba(31,81,255,0.3)] hover:shadow-[0_0_30px_rgba(31,81,255,0.6)] border border-gray-800 bg-dark-card hover:scale-105 animate-spin-reverse-slow group">
        <img src="assets/img/LOGOS-LANDING/logo_TRANSPOTRAVEL-removebg-preview.png" alt="Logo for Transpotravel project" class="w-full h-full p-0 object-contain scale-[1.8] opacity-90 group-hover:opacity-100 drop-shadow-[0_0_8px_rgba(255,255,255,0.1)] transition-transform duration-1000 ease-in-out" />
        <div class="absolute bottom-2 left-2 w-3 h-3 bg-neon-blue rounded-full shadow-neon-blue animate-glow-slow"></div>
      </a>
    </div>

  </div>

</section>
